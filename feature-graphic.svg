<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <!-- Background -->
  <rect width="1024" height="500" fill="#0D0D0D"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- Card stack — back -->
  <rect x="362" y="95" width="180" height="240" rx="16"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.18"
        transform="rotate(8, 452, 215)"/>

  <!-- Card stack — middle -->
  <rect x="362" y="95" width="180" height="240" rx="16"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.4"
        transform="rotate(-4, 452, 215)"/>

  <!-- Card stack — front -->
  <rect x="362" y="95" width="180" height="240" rx="16"
        fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Left arrow (delete) -->
  <!-- Circle -->
  <circle cx="620" cy="215" r="32" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.25"/>
  <!-- Shaft -->
  <line x1="588" y1="215" x2="536" y2="215" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.25"/>
  <!-- Head -->
  <polyline points="554,228 536,215 554,202" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- Big left arrow -->
  <line x1="330" y1="215" x2="240" y2="215" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <polyline points="268,234 240,215 268,196" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Big right arrow -->
  <line x1="574" y1="215" x2="664" y2="215" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <polyline points="636,196 664,215 636,234" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Delete label -->
  <text x="240" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFFFFF" opacity="0.5">Delete</text>

  <!-- Keep label -->
  <text x="664" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFFFFF" opacity="0.5">Keep</text>

  <!-- App name -->
  <text x="512" y="370" text-anchor="middle"
        font-family="sans-serif" font-weight="700" font-size="72"
        fill="#FFFFFF" letter-spacing="-2">SwipeDel</text>

  <!-- Tagline -->
  <text x="512" y="415" text-anchor="middle"
        font-family="sans-serif" font-size="22"
        fill="#FFFFFF" opacity="0.4">Swipe to clean your gallery</text>
</svg>
